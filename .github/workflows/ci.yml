name: CI

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read experiment flags
        id: flags
        run: |
          set -a
          source experiment/flags.env 2>/dev/null || true
          set +a
          echo "use_cache=${USE_PIP_CACHE:-true}" >> "$GITHUB_OUTPUT"
          echo "variation=${VARIATION:-baseline}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore pip cache
        if: steps.flags.outputs.use_cache == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff (static analysis)
        run: ruff check src tests | tee lint-report.txt

      - name: Upload lint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt
          retention-days: 7

  # SENTINEL:TEST_NEEDS (o driver alterna entre paralelo e sequencial editando a linha 'needs' abaixo)
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Read experiment flags
        id: flags
        run: |
          set -a
          source experiment/flags.env 2>/dev/null || true
          set +a
          echo "use_cache=${USE_PIP_CACHE:-true}" >> "$GITHUB_OUTPUT"
          echo "variation=${VARIATION:-baseline}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore pip cache
        if: steps.flags.outputs.use_cache == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests (pytest)
        run: |
          pytest \
            --junitxml=junit.xml \
            --json-report --json-report-file=report.json

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            report.json
          retention-days: 7

  metrics:
    name: Collect pipeline metrics
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Collect this run's job timings via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p out
          gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            > out/run-${{ github.run_id }}-jobs.json
          echo "Coletadas métricas dos jobs do run ${{ github.run_id }}"

      - name: Upload run metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-metrics
          path: out/
          retention-days: 7
